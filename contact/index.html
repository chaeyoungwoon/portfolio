    <h1>Contact</h1>

    <form action="mailto:ealexchoi@gmail.com" method="POST" enctype="text/plain">
        <label>
            Your Email
            <input type="email" name="email" placeholder="you@example.com">
        </label>
        <label>
            Subject
            <input type="text" name="subject" placeholder="Hello!">
        </label>
        <label>
            Message
            <textarea name="body" rows="6" placeholder="Your message here..."></textarea>
        </label>
        <button type="submit">Send</button>
    </form>

</body>
