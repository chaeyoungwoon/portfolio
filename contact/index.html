<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethan Choi: Contact</title>
    <link rel="stylesheet" href="../style.css">
    <script type="module" src="../global.js"></script>
</head>
<body>

    <h1>Contact</h1>

    <form action="mailto:ealexchoi@gmail.com">
        <label>
            Your Email
            <input type="email" name="email" placeholder="you@example.com">
        </label>
        <label>
            Subject
            <input type="text" name="subject" placeholder="Hello!">
        </label>
        <label>
            Message
            <textarea name="body" rows="6" placeholder="Your message here..."></textarea>
        </label>
        <button type="submit">Send</button>
    </form>

</body>
</html>
